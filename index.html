<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>RFID智能签到系统 · 快速操作指南</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-height:100vh;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;text-align:center;padding:24px 16px 18px}
.header h1{font-size:20px;margin-bottom:4px}
.header p{font-size:13px;opacity:.85}
.list{padding:12px 16px 80px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;text-decoration:none;color:#333}
.card:active{background:#f0f0f0}
.card .num{width:32px;height:32px;border-radius:50%;background:#1a73e8;color:#fff;text-align:center;line-height:32px;font-size:14px;font-weight:700;flex-shrink:0;margin-right:12px}
.card .info{flex:1;min-width:0}
.card .info .title{font-size:15px;font-weight:600;margin-bottom:2px}
.card .info .desc{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .arrow{color:#bbb;font-size:18px;flex-shrink:0}
.footer{text-align:center;padding:16px;font-size:11px;color:#bbb}
.refresh-btn{position:fixed;right:20px;bottom:20px;width:48px;height:48px;border-radius:50%;background:#1a73e8;color:#fff;font-size:20px;border:none;box-shadow:0 3px 10px rgba(26,115,232,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:999}
.refresh-btn:active{transform:scale(.92);box-shadow:0 1px 4px rgba(26,115,232,.4)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header"><h1>RFID智能签到系统 · 快速操作指南</h1><p>杰欣智能科技有限公司</p ></div>
<div class="list" id="list"></div>
<div class="footer">杰欣智能 · 成立于2014年</div>
<button class="refresh-btn" onclick="var b=this;b.style.animation='spin .6s linear';setTimeout(function(){location.replace(location.href.split('?')[0]+'?t='+Date.now())},500)">↻</button>
<script>
var videos=[
  {title:"810型通道机连接教程",url:"mmr7sAjYSdbjFZzpD_UEMg"},
  {title:"RFID 无障碍智能签到系统操作教程",url:"rQycHmv09_OYHASusOEY6Q"},
  {title:"人脸识别设置教程",url:"Yt4ZmaWsVKbPok477MT3uA"},
  {title:"广告机无法连接签到系统设置",url:"XaG5fgh7gLpAckEqOEYEXg"},
  {title:"签到系统无法正常启动解决教程",url:"k6mCh6nXYc0MdEsOYLUE0Q"}
];
var h="";
for(var i=0;i<videos.length;i++){
  var n=i+1;
  h+='<a class="card" href="https://mp.weixin.qq.com/s/'+videos[i].url+'"><div class="num">'+n+'</div><div class="info"><div class="title">'+videos[i].title+'</div><div class="desc">公众号图文 · 含视频</div></div><div class="arrow">▶</div></a >';
}
document.getElementById("list").innerHTML=h;
</script>
</body>
</html>
