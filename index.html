<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>杰欣智能 · 产品视频</title>
  <style>
    /* ====== 全局重置 ====== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ====== 页面基础样式 ====== */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      -webkit-touch-callout: none;   /* 禁止长按菜单 */
      -webkit-user-select: none;     /* 禁止选中文字 */
      user-select: none;
      touch-action: manipulation;    /* 禁止双击缩放 */
    }

    /* ====== 顶部标题栏 ====== */
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      text-align: center;
      padding: 24px 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p  { font-size: 13px; opacity: 0.85; }

    /* 下拉刷新提示条 */
    .pull-refresh {
      position: absolute;
      top: -40px; left: 0; right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
      opacity: 0.8;
      transition: top 0.3s;
    }
    .pull-refresh.show { top: 0; }
    .pull-refresh .arrow {
      display: inline-block;
      margin-right: 6px;
      transition: transform 0.3s;
    }
    .pull-refresh .arrow.up { transform: rotate(180deg); }

    /* ====== 视频列表容器 ====== */
    .list {
      padding: 12px 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ====== 视频卡片 ====== */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #333;
      transition: box-shadow 0.2s;
    }
    .card:active { background: #f0f0f0; }

    /* 圆形序号 */
    .card .num {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      text-align: center;
      line-height: 32px;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 12px;
    }

    /* 标题与描述 */
    .card .info { flex: 1; min-width: 0; }
    .card .info .title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .card .info .desc {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 右箭头 */
    .card .arrow {
      color: #bbb;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ====== 底部版权 ====== */
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>

<body>
